<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CS2 Premium - Detalle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --cs-orange: #f59e0b; --cs-dark: #0a0a0c; --glass-bg: rgba(20, 20, 25, 0.6); --glass-border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--cs-dark); color: #ffffff; font-family: 'Segoe UI', system-ui, sans-serif; background: radial-gradient(circle at 50% 0%, #1f1b2e 0%, var(--cs-dark) 50%, var(--cs-dark) 100%); background-size: 200% 200%; animation: backgroundShift 15s ease infinite; }
        @keyframes backgroundShift { 0% { background-position: 0% 0%; } 50% { background-position: 100% 0%; } 100% { background-position: 0% 0%; } }
        .glass-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; backdrop-filter: blur(15px); padding: 3rem; box-shadow: 0 15px 35px rgba(0,0,0,0.4); animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hero-img { max-height: 350px; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6)); transition: transform 0.5s ease; }
        .hero-img:hover { transform: scale(1.05) rotate(-2deg); }
        .price-row { background-color: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 12px; padding: 15px 20px; transition: all 0.3s; }
        .price-row:hover { background-color: rgba(255,255,255,0.08); border-color: rgba(245, 158, 11, 0.4); transform: translateX(5px); }
        .btn-cs2-outline { color: var(--cs-orange); border: 1px solid var(--cs-orange); background: transparent; border-radius: 30px; padding: 10px 25px; font-weight: 600; transition: all 0.3s; text-decoration: none; }
        .btn-cs2-outline:hover { background: var(--cs-orange); color: #000; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .btn-add { background: var(--cs-orange); color: #000; border: none; font-weight: bold; border-radius: 8px; transition: all 0.3s; }
        .btn-add:hover:not(:disabled) { box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container mt-5 mb-5">
    <a href="/" class="btn-cs2-outline mb-4 d-inline-block"><i class="bi bi-arrow-left"></i> Volver al catálogo</a>

    <div class="row align-items-center glass-panel">
        <div class="col-md-5 text-center mb-4 mb-md-0">
            <img th:src="'https://community.akamai.steamstatic.com/economy/image/' + ${foto}" class="img-fluid hero-img" alt="Arma">
            <h2 class="fw-bold mt-4" style="color: var(--cs-orange);" th:text="${nombre}">Nombre</h2>
        </div>

        <div class="col-md-7 ps-md-5">
            <h4 class="mb-4 text-secondary text-uppercase" style="letter-spacing: 1px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">Selecciona un desgaste:</h4>

            <div th:each="estado, stat : ${ {'Factory New', 'Minimal Wear', 'Field-Tested', 'Well-Worn', 'Battle-Scarred'} }">
                <div class="price-row d-flex justify-content-between align-items-center">
                    <span class="fs-5 fw-bold text-white" th:text="${estado}">Calidad</span>

                    <span class="fs-4 fw-bold" style="color: var(--cs-orange);"
                          th:with="precioActual=${stat.index == 0 ? fn : (stat.index == 1 ? mw : (stat.index == 2 ? ft : (stat.index == 3 ? ww : bs)))}"
                          th:text="${precioActual}">-</span>

                    <form action="/add-inventory" method="post" class="m-0"
                          th:with="precioActual=${stat.index == 0 ? fn : (stat.index == 1 ? mw : (stat.index == 2 ? ft : (stat.index == 3 ? ww : bs)))}">

                        <input type="hidden" name="nombre" th:value="${nombre}">
                        <input type="hidden" name="calidad" th:value="${estado}">
                        <input type="hidden" name="precio" th:value="${precioActual}">
                        <input type="hidden" name="foto" th:value="${foto}">

                        <button type="submit" class="btn btn-add px-4" th:disabled="${precioActual == '-'}">
                            <i class="bi bi-cart-plus-fill"></i> Añadir
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
