<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - CSkins</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-container {
            text-align: center;
            margin-top: 100px;
            padding: 40px;
            background-color: #2c2f33;
            color: white;
            border-radius: 10px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .error-container h1 { color: #ff4747; }
        .btn-volver {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff9900;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="error-container">
    <h1 th:text="${errorTitulo}">Error Genérico</h1>
    <p th:text="${errorMensaje}">Ha ocurrido un error inesperado.</p>

    <a href="/" class="btn-volver">Volver a la Base</a>
</div>

</body>
</html>
