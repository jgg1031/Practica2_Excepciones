<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CS2 HUB - Mi Mochila</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --cs-orange: #f59e0b; --cs-dark: #0a0a0c; --glass-bg: rgba(20, 20, 25, 0.6); --glass-border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--cs-dark); color: #fff; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at 50% 0%, #1f1b2e 0%, var(--cs-dark) 100%); }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: rgba(0,0,0,0.8); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding-top: 2rem; position: sticky; top: 0; }
        .sidebar .brand { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 3rem; }
        .sidebar .brand span { color: var(--cs-orange); }
        .sidebar a, .sidebar button { color: #888; text-decoration: none; padding: 18px 30px; font-weight: 600; display: flex; align-items: center; gap: 15px; background: none; border: none; width: 100%; text-align: left; }
        .sidebar a.active { color: #fff; border-left: 4px solid var(--cs-orange); }
        .glass-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; backdrop-filter: blur(15px); }
        .total-panel { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--cs-orange); border-radius: 20px; padding: 2rem; }
        .btn-delete { color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); background: transparent; border-radius: 8px; transition: 0.3s; }
        .btn-delete:hover { background: #ef4444; color: #fff; }
    </style>
</head>
<body>
<div class="wrapper">
    <nav class="sidebar">
        <div class="brand">CS2<span>HUB</span></div>
        <a href="/"><i class="bi bi-grid-1x2-fill"></i> Catálogo</a>
        <a href="/inventory" class="active"><i class="bi bi-backpack-fill"></i> Mi Mochila</a>
        <form th:action="@{/logout}" method="post" class="mt-auto mb-4">
            <button type="submit" class="text-danger"><i class="bi bi-box-arrow-left"></i> Salir</button>
        </form>
    </nav>

    <main class="p-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold display-4">Mi <span style="color: var(--cs-orange);">Mochila</span></h1>
            <a href="/" class="btn btn-outline-warning rounded-pill px-4">Seguir Comprando</a>
        </div>

        <div class="glass-panel">
            <div th:if="${#lists.isEmpty(inventario)}" class="text-center py-5">
                <i class="bi bi-box-seam display-1 text-secondary opacity-25"></i>
                <h3 class="mt-3 text-secondary">Tu inventario está vacío</h3>
            </div>

            <table class="table table-dark table-hover align-middle mb-0" th:unless="${#lists.isEmpty(inventario)}">
                <thead class="text-secondary text-uppercase" style="font-size: 0.8rem;">
                <tr>
                    <th>Skin</th>
                    <th>Nombre y Estado</th>
                    <th class="text-center">Cant.</th>
                    <th class="text-end">Precio Ud.</th>
                    <th class="text-end" style="color: var(--cs-orange);">Subtotal</th>
                    <th class="text-center">Acción</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${inventario}">
                    <td><img th:src="'https://community.akamai.steamstatic.com/economy/image/' + ${item.foto}" width="70"></td>
                    <td class="fw-bold" th:text="${item.nombre}">Nombre</td>
                    <td class="text-center" th:text="${item.cantidad}">1</td>
                    <td class="text-end text-secondary" th:text="${item.precioTexto}">$0.00</td>
                    <td class="text-end fw-bold text-warning" th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)} + ' €'">0.00€</td>
                    <td class="text-center">
                        <form action="/remove-inventory" method="post" class="d-flex justify-content-center gap-2">
                            <input type="hidden" name="nombre" th:value="${item.nombre}">
                            <input type="number" name="cantidadRemover" value="1" min="1" th:max="${item.cantidad}" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 60px;">
                            <button type="submit" class="btn btn-delete btn-sm"><i class="bi bi-trash-fill"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="total-panel mt-4 d-flex justify-content-between align-items-center" th:unless="${#lists.isEmpty(inventario)}">
            <h4 class="mb-0 fw-light">VALOR ESTIMADO DEL ALIJO</h4>
            <h2 class="display-4 fw-bold mb-0" style="color: var(--cs-orange);" th:text="${valorTotal} + ' €'">0.00 €</h2>
        </div>
    </main>
</div>
</body>
</html>
