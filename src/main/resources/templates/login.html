<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Premium - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cs-orange: #f59e0b; --cs-dark: #0a0a0c; --glass-bg: rgba(20, 20, 25, 0.6); --glass-border: rgba(255, 255, 255, 0.08); }
        body { background: radial-gradient(circle at 50% 0%, #1f1b2e 0%, var(--cs-dark) 50%, var(--cs-dark) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }
        .glass-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; backdrop-filter: blur(15px); padding: 3rem; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .brand { font-size: 2.5rem; letter-spacing: 2px; font-weight: 900; }
        .brand span { color: var(--cs-orange); }
        .custom-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; padding: 12px 20px; border-radius: 10px; width: 100%; margin-bottom: 1.5rem; transition: 0.3s; }
        .custom-input:focus { outline: none; border-color: var(--cs-orange); background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        .btn-cs2 { background: var(--cs-orange); color: #000; border: none; border-radius: 30px; padding: 12px 30px; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 1rem; }
        .btn-cs2:hover { box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); transform: translateY(-2px); }
        .link-cs2 { color: var(--cs-orange); text-decoration: none; font-weight: bold; transition: 0.3s; }
        .link-cs2:hover { text-shadow: 0 0 10px var(--cs-orange); }
    </style>
</head>
<body>
<div class="glass-panel">
    <h2 class="brand mb-2">CS2<span>HUB</span></h2>
    <h5 class="mb-4 text-secondary">Acceso Autorizado</h5>

    <div th:if="${error}" class="alert alert-danger py-2 fw-bold" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success py-2 fw-bold" th:text="${success}"></div>

    <form action="/login" method="post">
        <input type="text" name="username" class="custom-input" placeholder="Nombre de Agente" required autocomplete="off">
        <input type="password" name="password" class="custom-input" placeholder="Contraseña" required>
        <button type="submit" class="btn-cs2">ENTRAR</button>
    </form>

    <p class="mt-3 text-secondary" style="font-size: 0.9rem;">¿No tienes credenciales? <br> <a href="/registro" class="link-cs2">Solicita acceso aquí</a></p>
</div>
</body>
</html>
